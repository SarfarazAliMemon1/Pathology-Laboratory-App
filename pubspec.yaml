name: pathologylab_app
description: A pathology laboratory management system.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  pdf: ^3.10.4
  path_provider: ^2.1.0
  intl: ^0.18.1
  printing: ^5.11.1
  open_file: ^3.3.2
  fl_chart: ^0.68.0
  path: ^1.9.0
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.18
  drift_dev: ^2.25.1
  riverpod: ^2.6.0
  flutter_riverpod: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
